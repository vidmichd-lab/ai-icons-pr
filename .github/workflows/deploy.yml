name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/api/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix functions/api ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ vars.YC_API_GATEWAY_URL }}
        run: npm run build

      - name: Build backend
        run: npm run build:api

      - name: Install YC CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | \
            bash -s -- -a -i "$HOME/yandex-cloud" -n
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Configure YC CLI
        env:
          YC_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_JSON }}
          YC_CLOUD_ID: ${{ vars.YC_CLOUD_ID }}
          YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
        run: |
          printf '%s' "$YC_SERVICE_ACCOUNT_KEY_JSON" > key.json
          yc config profile create ci
          yc config set service-account-key key.json
          yc config set cloud-id "$YC_CLOUD_ID"
          yc config set folder-id "$YC_FOLDER_ID"

      - name: Deploy backend function
        env:
          KREA_API_TOKEN: ${{ secrets.KREA_API_TOKEN }}
          YC_BUCKET_NAME: ${{ vars.YC_BUCKET_NAME }}
          YC_FUNCTION_NAME: ${{ vars.YC_FUNCTION_NAME }}
          YC_STORAGE_ACCESS_KEY: ${{ secrets.YC_STORAGE_ACCESS_KEY }}
          YC_STORAGE_SECRET_KEY: ${{ secrets.YC_STORAGE_SECRET_KEY }}
          YC_STORAGE_PUBLIC_BASE_URL: ${{ vars.YC_STORAGE_PUBLIC_BASE_URL }}
        run: |
          yc serverless function version create \
            --function-name "$YC_FUNCTION_NAME" \
            --runtime nodejs22 \
            --entrypoint index.handler \
            --memory 512MB \
            --execution-timeout 30s \
            --source-path functions/api/dist \
            --environment \
              KREA_API_TOKEN="$KREA_API_TOKEN",\
STORAGE_BUCKET="$YC_BUCKET_NAME",\
STORAGE_ACCESS_KEY="$YC_STORAGE_ACCESS_KEY",\
STORAGE_SECRET_KEY="$YC_STORAGE_SECRET_KEY",\
STORAGE_REGION=ru-central1,\
STORAGE_ENDPOINT=https://storage.yandexcloud.net,\
STORAGE_PUBLIC_BASE_URL="$YC_STORAGE_PUBLIC_BASE_URL"
          yc serverless function allow-unauthenticated-invoke "$YC_FUNCTION_NAME"

      - name: Upload frontend bundle
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_STORAGE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_STORAGE_SECRET_KEY }}
          AWS_DEFAULT_REGION: ru-central1
          YC_BUCKET_NAME: ${{ vars.YC_BUCKET_NAME }}
        run: |
          aws s3 sync dist "s3://$YC_BUCKET_NAME" \
            --endpoint-url https://storage.yandexcloud.net \
            --delete
